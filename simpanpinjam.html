<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox: Google Form & Spreadsheet</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h2 {
            color: #333;
            border-bottom: 2px solid #0078d4;
            padding-bottom: 8px;
            margin-top: 0;
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            margin-top: 15px;
        }

        /* Khusus untuk Spreadsheet agar bisa scroll horizontal jika layarnya kecil */
        .sheet-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            width: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Formulir Input Data</h2>
        <div class="iframe-wrapper">
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLSfZV9gT6iZRiCIWHV48GlOulTJD4QUX4Yog3pE5DT1r05ZIzA/viewform?embedded=true" 
                height="2019" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0">
                Memuat…
            </iframe>
        </div>
    </div>

    <div class="container">
        <h2>Respons / Data Spreadsheet</h2>
        <div class="iframe-wrapper sheet-wrapper">
            <iframe 
                src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQpr_thg_SR74w-ANSCE0_VRBO6EUuSeUFeCb3efjG7YnfNg6YJEBNbtO5PAbrqYv21OTMQt8XGcZif/pubhtml?widget=true&amp;headers=false" 
                height="500" 
                frameborder="0">
                Memuat…
            </iframe>
        </div>
    </div>

</body>
</html>
