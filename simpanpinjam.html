<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring & Kepuasan</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4285f4;
            --border-radius: 8px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        header p {
            color: #7f8c8d;
            margin-top: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .section-title {
            font-size: 1.5rem;
            color: #2c3e50;
            border-left: 5px solid var(--primary-color);
            padding-left: 10px;
            margin-bottom: 20px;
        }

        .grid-two-columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #34495e;
            font-size: 1.1rem;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }

        /* Tinggi spesifik untuk kenyamanan visual */
        .height-form { height: 550px; }
        .height-sheet { height: 500px; }
        .height-studio { height: 600px; }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Responsif untuk layar HP */
        @media (max-width: 600px) {
            .grid-two-columns {
                grid-template-columns: 1fr;
            }
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Dashboard Integrasi Data</h1>
        <p>Manajemen Formulir, Spreadsheet, dan Analisis Data Studio</p>
    </header>

    <div class="container">

        <section>
            <div class="section-title">Formulir Utama & Data Masuk</div>
            <div class="grid-two-columns">
                <div class="card">
                    <h3>Formulir Input Data</h3>
                    <div class="iframe-container height-form">
                        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeHt04A1_WW72Kihrl2QMxBqSgnU8KZTsHMr0tbrEVBJHCstw/viewform?embedded=true">Memuat…</iframe>
                    </div>
                </div>

                <div class="card">
                    <h3>Respon Spreadsheet Utama</h3>
                    <div class="iframe-container height-sheet">
                        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSPwP1Ahu_eB2r-DM0rBZ1pEY9Bg05X5PYq7m4s6kt0hnPRTdpnIVxXqzK7dG4kihSNo60-bZi21G5Q/pubhtml?widget=true&amp;headers=false">Memuat…</iframe>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="section-title">Visualisasi & Laporan Analitik</div>
            <div class="card">
                <h3>Looker Studio Report</h3>
                <div class="iframe-container height-studio">
                    <iframe src="https://datastudio.google.com/embed/reporting/dbb82fb9-2858-49e8-a92a-0da8cff534f9/page/page_12345" allowfullscreen>Memuat…</iframe>
                </div>
            </div>
        </section>

        <section>
            <div class="section-title">Survei Tingkat Kepuasan</div>
            <div class="grid-two-columns">
                <div class="card">
                    <h3>Formulir Kepuasan</h3>
                    <div class="iframe-container height-form">
                        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfVClaSaNDN3qq6TpUFlYgRUNQ-V51V6YKM5BhTBRUHDX-Q7A/viewform?embedded=true">Memuat…</iframe>
                    </div>
                </div>

                <div class="card">
                    <h3>Respon Spreadsheet Kepuasan</h3>
                    <div class="iframe-container height-sheet">
                        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRVEGFAd_dbO73DT2_UVkd6PQDDY0FuAVS-be0EyGclWnTjWzq2moy6E66QDxi4pAEMWIrVfwB3OJCa/pubhtml?widget=true&amp;headers=false">Memuat…</iframe>
                    </div>
                </div>
            </div>
        </section>

    </div>

</body>
</html>
