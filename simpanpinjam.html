<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrasi Google Form & Spreadsheet</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Responsive iframe untuk Spreadsheet */
        .spreadsheet-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Aspect Ratio 16:9 */
            height: 0;
            overflow: hidden;
        }

        .spreadsheet-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Formulir Input Data</h2>
        <div class="iframe-wrapper">
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLScVhMqB59hBAPAX2giKikcVtKB_yK_4z3AoBd_yGZUzjXVcJw/viewform?embedded=true" 
                width="640" 
                height="1129" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0"
                sandbox="allow-apps allow-forms allow-scripts allow-same-origin">
                Memuat…
            </iframe>
        </div>
    </div>

    <div class="container">
        <h2>Respons & Data Spreadsheet</h2>
        <div class="spreadsheet-wrapper">
            <iframe 
                src="https://docs.google.com/sheets/d/e/2PACX-1vTQUs8yLCAlhTpfEaijrgrtNwUvsq___-IUnrG3L2I6fFjSG6TDcH16kqEIOfVvsG3sDMucFg_j0XsX/pubhtml?widget=true&amp;headers=false"
                sandbox="allow-scripts allow-same-origin">
                Memuat…
            </iframe>
        </div>
    </div>

</body>
</html>
