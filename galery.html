<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - My Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS INTERNAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding-bottom: 50px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Navigasi */
        nav {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover {
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* Container Utama */
        .container {
            width: 90%;
            max-width: 1000px;
            margin-top: 50px;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        p {
            margin-bottom: 40px;
            opacity: 0.8;
        }

        /* Grid Galeri */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        /* Card Foto */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            aspect-ratio: 1 / 1; /* Membuat kotak sempurna */
            cursor: pointer;
            transition: 0.4s;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        /* Efek Hover */
        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border-color: white;
        }

        .gallery-item:hover img {
            transform: scale(1.1) rotate(2deg);
            filter: brightness(1.1);
        }

        /* Overlay Text saat Hover */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 20px;
            opacity: 0;
            transition: 0.3s;
            text-align: left;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr); /* 2 kolom di HP */
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri.html">Galeri</a>
        <a href="vidio.html">Video</a>
    </nav>

    <div class="container">
        <h1>My Gallery</h1>
        <p>Kumpulan momen dan karya terbaik saya.</p>
        
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=500&q=80" alt="Landscape 1">
                <div class="overlay">
                    <h4>Momen 1</h4>
                    <small>Deskripsi singkat foto</small>
                </div>
            </div>

            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=500&q=80" alt="Landscape 2">
                <div class="overlay">
                    <h4>Momen 2</h4>
                    <small>Deskripsi singkat foto</small>
                </div>
            </div>

            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=500&q=80" alt="Landscape 3">
                <div class="overlay">
                    <h4>Momen 3</h4>
                    <small>Deskripsi singkat foto</small>
                </div>
            </div>

            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=500&q=80" alt="Landscape 4">
                <div class="overlay">
                    <h4>Momen 4</h4>
                    <small>Deskripsi singkat foto</small>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
