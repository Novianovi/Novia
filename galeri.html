<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - My Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* RESET & BASE STYLE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* NAVIGASI */
        nav {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        nav a:hover {
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            color: #eee;
        }

        /* CONTAINER UTAMA */
        .container {
            width: 90%;
            max-width: 1100px;
            margin-top: 50px;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .subtitle {
            margin-bottom: 40px;
            opacity: 0.9;
            font-weight: 300;
        }

        /* GRID GALERI */
        .gallery-grid {
            display: grid;
            /* Membuat 4 kolom pas pada layar besar, otomatis menyesuaikan pada layar kecil */
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        /* CARD FOTO */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            aspect-ratio: 1 / 1; /* Memastikan semua foto berbentuk kotak simetris */
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Memotong gambar agar memenuhi kotak tanpa gepeng */
            transition: 0.6s ease;
        }

        /* EFEK HOVER */
        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .gallery-item:hover img {
            transform: scale(1.1);
            filter: brightness(0.7);
        }

        /* OVERLAY TEXT */
        .overlay {
            position: absolute;
            bottom: -100%; /* Sembunyi di bawah */
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 25px 20px;
            transition: 0.4s ease;
            text-align: left;
        }

        .gallery-item:hover .overlay {
            bottom: 0; /* Muncul saat hover */
        }

        .overlay h4 {
            font-size: 1.1rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .overlay small {
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr); /* 2 kolom di tablet/HP besar */
                gap: 15px;
            }
            h1 { font-size: 2rem; }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr; /* 1 kolom di HP kecil agar foto terlihat jelas */
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri.html">Galeri</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="container">
        <h1>My Gallery</h1>
        <p class="subtitle">Kumpulan momen dan karya terbaik saya</p>
        
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="foto depan.jpeg" alt="Tampilan Depan">
                <div class="overlay">
                    <h4>Bagian Depan</h4>
                    <small>Momen di halaman utama</small>
                </div>
            </div>

            <div class="gallery-item">
                <img src="foto samping.jpeg" alt="Tampilan Samping">
                <div class="overlay">
                    <h4>Bagian Samping</h4>
                    <small>Perspektif dari sisi rumah</small>
                </div>
            </div>

            <div class="gallery-item">
                <img src="foto dalam.jpeg" alt="Tampilan Dalam">
                <div class="overlay">
                    <h4>Interior</h4>
                    <small>Suasana di dalam ruangan</small>
                </div>
            </div>

            <div class="gallery-item">
                <img src="foto dapur.jpeg" alt="Tampilan Dapur">
                <div class="overlay">
                    <h4>Area Dapur</h4>
                    <small>Ruang memasak yang nyaman</small>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
