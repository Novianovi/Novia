<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumpulan Tugas Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 { margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }

        .menu-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            width: 250px;
            text-align: center;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }

        .task-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-10px);
            border-color: #38bdf8;
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
        }

        .task-card h2 { font-size: 1.5rem; margin-bottom: 10px; }
        .task-card p { font-size: 0.9rem; opacity: 0.7; }

        /* Label Tugas 2 yang belum aktif */
        .disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>Daftar Tugas Web</h1>

    <div class="menu-container">
        <a href="tugas1/indeks.html" class="task-card">
            <h2>tugas 1</h2>
            <p>Website Portofolio (Biodata, Galeri, Video)</p>
        </a>

        <div class="task-card disabled">
            <h2>Tugas 2</h2>
            <p>Coming Soon / Sedang Dikerjakan</p>
        </div>
    </div>

</body>
</html>
