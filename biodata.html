<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Terpisah - My Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding-bottom: 50px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Navigasi */
        nav {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        /* Container Utama */
        .container {
            width: 90%;
            max-width: 600px;
            margin-top: 30px;
            text-align: center;
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid white;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        /* Style Kartu Terpisah */
        .info-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            transition: 0.3s;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
        }

        .info-card:hover {
            transform: translateX(10px);
            background: rgba(255, 255, 255, 0.25);
        }

        .info-card .label {
            font-size: 0.8rem;
            font-weight: 300;
            text-transform: uppercase;
            color: #eee;
            margin-bottom: 5px;
        }

        .info-card .value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Animasi Muncul Satu Per Satu */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-1 { animation-delay: 0.2s; }
        .card-2 { animation-delay: 0.4s; }
        .card-3 { animation-delay: 0.6s; }
        .card-4 { animation-delay: 0.8s; }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: white;
            color: #e73c7e;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-back:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri.html">Galeri</a>
        <a href="vidio.html">Video</a>
    </nav>

    <div class="container">
        <img src="foto novia (2).jpg" alt="Foto Novia" class="profile-img">
        <h1>Profil Saya</h1>

        <div class="info-card card-1">
            <span class="label">Nama Lengkap</span>
            <span class="value">Novia</span>
        </div>

        <div class="info-card card-2">
            <span class="label">Tempat, Tanggal Lahir</span>
            <span class="value">Kuala Lupak, 21 Agustus 2004</span>
        </div>

        <div class="info-card card-3">
            <span class="label">Pendidikan</span>
            <span class="value">S1 Sosial Ekonomi Perikanan</span>
        </div>

        <div class="info-card card-4">
            <span class="label">Alamat</span>
            <span class="value">Jl. Pandawa 4</span>
        </div>

        <a href="index.html" class="btn-back">Kembali ke Home</a>
    </div>

</body>
</html>
