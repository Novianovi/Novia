<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata - My Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS INTERNAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Navigasi */
        nav {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover {
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* Container Biodata */
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 30px;
            margin: 50px 20px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.5);
            margin: 0 auto 20px;
            display: block;
            object-fit: cover;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Styling Tabel */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        table tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        table tr:last-child {
            border-bottom: none;
        }

        table td {
            padding: 15px;
            font-size: 1.1rem;
        }

        .label {
            font-weight: 600;
            width: 40%;
            color: rgba(255, 255, 255, 0.8);
        }

        .value {
            width: 60%;
        }

        /* Button Back */
        .btn-back {
            display: block;
            width: fit-content;
            margin: 30px auto 0;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.3s;
        }

        .btn-back:hover {
            background: white;
            color: #764ba2;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri.html">Galeri</a>
        <a href="vidio.html">Video</a>
    </nav>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt=" foto novia.jpeg">
        
        <h1>Profil Saya</h1>
        
        <table>
            <tr>
                <td class="label">Nama </td>
                <td class="value">Novia </td>
            </tr>
            <tr>
                <td class="label">Tempat, Tgl Lahir</td>
                <td class="value"> Kuala lupak, 21 Agustus 2004</td>
            </tr>
            <tr>
                <td class="label">Pendidikan</td>
                <td class="value">S1 Sosial Ekonomi Perikanan XX</td>
            </tr>
            <tr>
            
                <td class="label">Alamat</td>
                <td class="value">Jl. Pandawa 4</td>
            
            </tr>
        </table>

        <a href="index.html" class="btn-back">Kembali ke Home</a>
    </div>

</body>
</html>
